name: Index Documentation

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/index-docs.yml"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit docs_index.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install openai numpy

      - name: Build docs index
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DOCS_DIR: docs/         # Change this if your docs live elsewhere
          INDEX_FILE: docs_index.json
          CHUNK_SIZE: "400"
          CHUNK_OVERLAP: "50"
        run: python scripts/build_index.py

      - name: Commit updated index
        run: |
          git config user.name  "docs-agent[bot]"
          git config user.email "docs-agent[bot]@users.noreply.github.com"
          git add docs_index.json
          if git diff --staged --quiet; then
            echo "No changes to index, skipping commit."
          else
            git commit -m "chore: update docs index [skip ci]"
            git push
          fi
